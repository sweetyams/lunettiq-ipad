<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunettiq — iPad App</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

  #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

  /* Tweaks panel */
  #tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; z-index: 9999;
    background: #fff; border: 1px solid #DDD8CE; border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18); padding: 18px 20px; width: 260px;
    display: none; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  #tweaks-panel.open { display: block; }
  .tweak-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #7A7A8A; margin-bottom: 8px; margin-top: 14px; }
  .tweak-label:first-child { margin-top: 0; }
  .tweak-btn { border: 1px solid #E5E5E5; border-radius: 0; padding: 7px 12px; font-size: 12px; cursor: pointer; background: #fff; font-family: inherit; }
  .tweak-btn.active { background: #0A0A0A; color: #fff; border-color: #0A0A0A; }
  .tweak-row { display: flex; gap: 6px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>

<div id="tweaks-panel">
  <div style="font-size:13px;font-weight:700;color:#0A0A0A;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;">
    Tweaks
    <button onclick="document.getElementById('tweaks-panel').classList.remove('open')" style="background:none;border:none;cursor:pointer;color:#7A7A8A;font-size:18px;line-height:1;">×</button>
  </div>
  <div class="tweak-label">Active screen</div>
  <div class="tweak-row" id="tweak-screen"></div>
  <div class="tweak-label">Mode</div>
  <div class="tweak-row" id="tweak-mode"></div>
  <div class="tweak-label">Staff</div>
  <div class="tweak-row" id="tweak-staff"></div>
</div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="home-screen.jsx"></script>
<script type="text/babel" src="clients-screen.jsx"></script>
<script type="text/babel" src="products-screen.jsx"></script>
<script type="text/babel" src="session-fitting.jsx"></script>
<script type="text/babel" src="appointments-screen.jsx"></script>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "activeTab": "home",
  "clientMode": false,
  "staffName": "Marie Leblanc"
}/*EDITMODE-END*/;

function MoreScreen({ clientMode }) {
  const items = [
    { label: 'Second Sight', sub: '2 pending intake reviews', icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>, badge: 2 },
    { label: 'Custom Designs', sub: '1 draft pending', icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>, badge: 1 },
    { label: 'Reports', sub: 'This month · Outremont', icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>, staffOnly: true },
    { label: 'Settings', sub: 'Device, sync, account', icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>, staffOnly: true },
  ];
  return (
    <div style={{ flex: 1, background: '#F7F7F7', padding: '28px 28px', overflowY: 'auto' }}>
      <h2 style={{ fontSize: 24, fontWeight: 300, color: C.navy, marginBottom: 20, letterSpacing: '-0.02em' }}>More</h2>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, maxWidth: 480 }}>
        {items.filter(i => !i.staffOnly || !clientMode).map(item => (
          <div key={item.label} style={{ background: C.white, borderRadius: 12, border: `1px solid ${C.border}`, padding: '16px 18px', display: 'flex', alignItems: 'center', gap: 14, cursor: 'pointer' }}>
            <div style={{ width: 40, height: 40, borderRadius: 10, background: '#F7F7F7', display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.navy, flexShrink: 0 }}>{item.icon}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 600, color: C.navy }}>{item.label}</div>
              <div style={{ fontSize: 12, color: C.muted }}>{item.sub}</div>
            </div>
            {item.badge && <span style={{ background: C.goldLight, color: C.gold, padding: '3px 9px', borderRadius: 10, fontSize: 12, fontWeight: 700 }}>{item.badge}</span>}
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── iPad Bezel ────────────────────────────────────────────────────────────────
function iPadBezel({ children }) {
  const [scale, setScale] = React.useState(1);
  const W = 1366, H = 1024;
  React.useEffect(() => {
    const update = () => setScale(Math.min((window.innerWidth - 32) / W, (window.innerHeight - 32) / H));
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);
  return (
    <div style={{ width: W * scale, height: H * scale, position: 'relative' }}>
      <div style={{ width: W, height: H, transform: `scale(${scale})`, transformOrigin: 'top left', position: 'absolute', top: 0, left: 0 }}>
        {/* Bezel */}
        <div style={{ width: '100%', height: '100%', background: 'linear-gradient(160deg, #2C2C2C 0%, #181818 100%)', borderRadius: 22, padding: '14px 14px 18px', boxShadow: '0 0 0 1px #3A3A3A, 0 0 0 2.5px #111, 0 50px 100px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.05)', position: 'relative' }}>
          {/* Side button */}
          <div style={{ position: 'absolute', top: 80, right: -3, width: 3, height: 40, background: '#2A2A2A', borderRadius: '0 3px 3px 0' }} />
          <div style={{ position: 'absolute', top: 140, right: -3, width: 3, height: 60, background: '#2A2A2A', borderRadius: '0 3px 3px 0' }} />
          <div style={{ position: 'absolute', top: 210, right: -3, width: 3, height: 60, background: '#2A2A2A', borderRadius: '0 3px 3px 0' }} />
          {/* Screen */}
          <div style={{ width: '100%', height: '100%', borderRadius: 10, overflow: 'hidden', background: '#FFFFFF' }}>
            {children}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('lunettiq_state') || '{}'); } catch { return {}; } })();

  const [activeTab, setActiveTab] = React.useState(TWEAK_DEFAULTS.activeTab || saved.activeTab || 'home');
  const [clientMode, setClientMode] = React.useState(TWEAK_DEFAULTS.clientMode ?? false);
  const [staffName] = React.useState(TWEAK_DEFAULTS.staffName || 'Marie Leblanc');
  const [session, setSession] = React.useState(null);
  const [focusClient, setFocusClient] = React.useState(null);

  React.useEffect(() => {
    localStorage.setItem('lunettiq_state', JSON.stringify({ activeTab }));
  }, [activeTab]);

  const handleStartSession = (client) => {
    setSession(client);
    setActiveTab('session');
  };

  const handleViewClient = (client) => {
    setFocusClient(client);
    setActiveTab('clients');
  };

  const handleEndSession = () => {
    setSession(null);
    setActiveTab('home');
  };

  const handleTabChange = (tab) => {
    if (tab !== 'session') setActiveTab(tab);
    else setActiveTab(tab);
  };

  // Tweaks wiring
  React.useEffect(() => {
    const screens = ['home','clients','products','appointments','more'];
    const screenEl = document.getElementById('tweak-screen');
    const modeEl = document.getElementById('tweak-mode');
    const staffEl = document.getElementById('tweak-staff');
    if (!screenEl) return;
    screenEl.innerHTML = '';
    screens.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'tweak-btn' + (activeTab === s ? ' active' : '');
      btn.textContent = s.charAt(0).toUpperCase() + s.slice(1);
      btn.onclick = () => setActiveTab(s);
      screenEl.appendChild(btn);
    });
    modeEl.innerHTML = '';
    [['Staff', false], ['Client', true]].forEach(([label, val]) => {
      const btn = document.createElement('button');
      btn.className = 'tweak-btn' + (clientMode === val ? ' active' : '');
      btn.textContent = label;
      btn.onclick = () => setClientMode(val);
      modeEl.appendChild(btn);
    });
    staffEl.innerHTML = '';
    ['Marie Leblanc', 'Alex Dubois', 'Camille Roy'].forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'tweak-btn' + (staffName === name ? ' active' : '');
      btn.textContent = name.split(' ')[0];
      staffEl.appendChild(btn);
    });
  });

  React.useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const renderScreen = () => {
    if (activeTab === 'session' && session) {
      return <SessionMode client={session} onEnd={handleEndSession} clientMode={clientMode} onToggleMode={() => setClientMode(m => !m)} />;
    }
    switch (activeTab) {
      case 'home':        return <HomeScreen onStartSession={handleStartSession} onViewClient={handleViewClient} clientMode={clientMode} />;
      case 'clients':     return <ClientsScreen onStartSession={handleStartSession} clientMode={clientMode} initialClient={focusClient} />;
      case 'products':    return <ProductsScreen clientMode={clientMode} />;
      case 'appointments':return <AppointmentsScreen onStartSession={handleStartSession} clientMode={clientMode} />;
      case 'more':        return <MoreScreen clientMode={clientMode} />;
      default:            return null;
    }
  };

  const effectiveTab = activeTab === 'session' ? 'home' : activeTab;

  return (
    <iPadBezel>
      <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', fontFamily: "'Helvetica Neue', Helvetica, Arial, sans-serif" }}>
        <StatusBar staffName={staffName} syncStatus="synced" clientMode={clientMode} onToggleMode={() => setClientMode(m => !m)} />
        <ModeBar clientMode={clientMode} />
        <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
          {renderScreen()}
        </div>
        <TabBar activeTab={effectiveTab} onTabChange={handleTabChange} sessionActive={!!session} />
      </div>
    </iPadBezel>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
